# Propel — Supabase local & project configuration
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "propel"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Branded Propel email templates (also applied to the remote project via the
# Management API once a custom SMTP provider is configured — template editing is
# blocked on free tier with the default email provider).
[auth.email.template.confirmation]
subject = "Confirm your email · Propel"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your Propel password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Your Propel sign-in link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.invite]
subject = "You're invited to Propel"
content_path = "./supabase/templates/invite.html"

[auth.email.template.email_change]
subject = "Confirm your new email · Propel"
content_path = "./supabase/templates/email_change.html"

# Custom JWT claims: org_id + role from public.profiles (migration 20260626000002)
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

# Edge Functions verify JWT by default; public functions opt out below.
[functions.propel-api]
verify_jwt = true

[functions.public-api]
verify_jwt = false

[functions.public-forms]
verify_jwt = false

[functions.public-booking]
verify_jwt = false

# Stripe calls this unauthenticated; the webhook signature is the trust anchor.
[functions.stripe-webhook]
verify_jwt = false

[analytics]
enabled = false
