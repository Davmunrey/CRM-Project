# Main nginx.conf — overrides the base image defaults for high-concurrency use.
# worker_processes auto: one worker per CPU core.
# worker_connections 4096: supports 500 tenants with headroom for static assets.

worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # Include all conf.d snippets (server blocks, upstreams, rate-limit zones)
    include /etc/nginx/conf.d/*.conf;
}
