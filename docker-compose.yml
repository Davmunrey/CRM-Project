services:

  # ── Database ──────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: n0crm
      POSTGRES_USER: n0crm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n0crm_dev_pass}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n0crm}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 2g
    cpus: '2'

  # ── Connection pooler ─────────────────────────────────────────────────────────
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "25"
      SERVER_RESET_QUERY: DISCARD ALL
      # AUTH_FILE and AUTH_TYPE are driven by pgbouncer.ini
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "127.0.0.1:6432:6432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 256m
    cpus: '0.5'

  # ── Cache ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 512m
    cpus: '0.5'

  # ── Schema migration (runs once, exits) ───────────────────────────────────────
  migrate:
    build:
      context: ./api
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      DATABASE_URL: postgres://n0crm:${POSTGRES_PASSWORD:-n0crm_dev_pass}@pgbouncer:6432/n0crm
    command: sh -c "npm run db:migrate"
    depends_on:
      pgbouncer:
        condition: service_healthy
    restart: "no"

  # ── Seed (opt-in only: docker compose --profile seed up seed) ─────────────────
  seed:
    build:
      context: ./api
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      DATABASE_URL: postgres://n0crm:${POSTGRES_PASSWORD:-n0crm_dev_pass}@pgbouncer:6432/n0crm
    command: sh -c "npm run db:seed"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"
    profiles:
      - seed

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://n0crm:${POSTGRES_PASSWORD:-n0crm_dev_pass}@pgbouncer:6432/n0crm
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@n0crm.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      # AI / agentic features — Gemini is the free default; any one key enables it.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-gemini}
      # Trusted proxy hops for client-IP resolution (nginx only = 1).
      TRUST_PROXY: ${TRUST_PROXY:-1}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY must be set}
    ports:
      # Bind to loopback only — nginx reaches the API over the compose network
      # (api:3001). This prevents external clients from bypassing nginx (and its
      # rate-limit zone) by hitting the API port directly on the host.
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 1g
    cpus: '1'

  # ── Frontend / nginx ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      N0CRM_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    mem_limit: 256m
    cpus: '0.5'

  # ── Postgres metrics exporter ─────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      # Uses main user — create a dedicated read-only role in production
      DATA_SOURCE_NAME: "postgresql://n0crm:${POSTGRES_PASSWORD:-n0crm_dev_pass}@postgres:5432/n0crm?sslmode=disable"
    ports:
      - "127.0.0.1:9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Node / host metrics exporter ──────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    # port 9100 is exposed directly via host network

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - postgres-exporter

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      - prometheus

  # ── Automated backup ──────────────────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: n0crm
      POSTGRES_DB: n0crm
      PGPASSWORD: ${POSTGRES_PASSWORD:-n0crm_dev_pass}
    volumes:
      - ./infra/backup/backup.sh:/backup.sh:ro
      - ./infra/backup/crontab:/etc/crontabs/root:ro
      - ./backups:/backups
    # Install crond and run it; Alpine uses busybox crond (-f = foreground)
    command: >
      sh -c "chmod +x /backup.sh && crond -f -l 2"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
