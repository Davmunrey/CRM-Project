name: Build & publish API image

on:
  push:
    branches: [master]
    paths:
      - 'api/**'
      - '.gitea/workflows/build-api.yml'
  workflow_dispatch:

env:
  IMAGE: gitea-clovrlabs.apps.privateprompt.tech/clovrlabs/n0crm-api

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          rm -rf .git
          git init
          git remote add origin "https://oauth2:${GIT_TOKEN}@gitea-clovrlabs.apps.privateprompt.tech/clovrlabs/n0CRM.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Log in to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login gitea-clovrlabs.apps.privateprompt.tech -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build and push
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:latest \
            --tag ${{ env.IMAGE }}:api-${{ github.sha }} \
            --file api/Dockerfile \
            .
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:api-${{ github.sha }}
