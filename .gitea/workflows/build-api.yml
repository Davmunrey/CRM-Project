name: Build & publish API image

on:
  push:
    branches: [master]
    paths:
      - 'api/**'
      - '.gitea/workflows/build-api.yml'
  workflow_dispatch:

env:
  IMAGE: gitea.apps.privateprompt.tech/clovrlabs/n0crm-api

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login gitea.apps.privateprompt.tech -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Set up buildx builder
        run: docker buildx create --use --name n0crm-builder --driver docker-container || docker buildx use n0crm-builder

      - name: Build and push
        run: |
          docker buildx build \
            --push \
            --tag ${{ env.IMAGE }}:latest \
            --tag ${{ env.IMAGE }}:sha-${{ github.sha }} \
            --cache-from type=registry,ref=${{ env.IMAGE }}:buildcache \
            --cache-to   type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max \
            api

      - name: Remove buildx builder
        if: always()
        run: docker buildx rm n0crm-builder || true
