name: Build & publish API image

on:
  push:
    branches: [master]
    paths:
      - 'api/**'
      - '.gitea/workflows/build-api.yml'
  workflow_dispatch:

env:
  IMAGE: gitea.apps.privateprompt.tech/clovrlabs/n0crm-api

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login gitea.apps.privateprompt.tech -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Set up buildx builder
        run: |
          docker buildx inspect default >/dev/null 2>&1 || docker buildx create --use --name default --driver docker
          docker buildx use default

      - name: Build and push
        run: |
          docker buildx build \
            --push \
            --tag ${{ env.IMAGE }}:latest \
            --tag ${{ env.IMAGE }}:sha-${{ github.sha }} \
            --cache-from type=local,src=/tmp/buildx-cache-api \
            --cache-to   type=local,dest=/tmp/buildx-cache-api-new,mode=max \
            --file api/Dockerfile \
            .
          mv /tmp/buildx-cache-api-new /tmp/buildx-cache-api 2>/dev/null || true
