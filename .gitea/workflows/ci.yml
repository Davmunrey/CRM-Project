name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      # vite build runs in production mode; without secrets the repo rejects
      # production/staging channels (see vite.config.ts). Demo channel matches
      # an offline CI smoke build — real deploys set channel + Supabase on the host.
      - name: Vite build (CI)
        env:
          VITE_APP_CHANNEL: demo
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (critical+)
        run: npm audit --audit-level=critical
