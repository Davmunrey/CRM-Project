name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  api:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        working-directory: ${{ github.workspace }}
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          rm -rf .git
          git init
          git remote add origin "https://oauth2:${GIT_TOKEN}@gitea-clovrlabs.apps.privateprompt.tech/clovrlabs/Propel.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Setup Node 22
        run: |
          export NVM_DIR="${HOME}/.nvm"
          if [ -s "${NVM_DIR}/nvm.sh" ]; then
            . "${NVM_DIR}/nvm.sh"
            nvm use 22 2>/dev/null || nvm install 22
          fi
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Dependency audit (critical)
        run: |
          # The self-hosted runner reaches the npm package CDN (npm ci works) but not
          # the advisory API, so a plain `npm audit` hangs ~10 min and reds the job.
          # Time-box it: clean → pass, real critical finding → fail, timeout → warn only.
          if timeout 120 npm audit --audit-level=critical; then
            echo "npm audit: clean"
          elif [ $? -eq 124 ]; then
            echo "::warning::npm audit timed out reaching the advisory API — skipped (review locally)"
          else
            echo "::error::npm audit found critical vulnerabilities"
            exit 1
          fi

  ci:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      # working-directory override: checkout must run from workspace root,
      # not from frontend/ (which doesn't exist yet).
      - name: Checkout
        working-directory: ${{ github.workspace }}
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          rm -rf .git
          git init
          git remote add origin "https://oauth2:${GIT_TOKEN}@gitea-clovrlabs.apps.privateprompt.tech/clovrlabs/Propel.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Setup Node 22
        run: |
          export NVM_DIR="${HOME}/.nvm"
          if [ -s "${NVM_DIR}/nvm.sh" ]; then
            . "${NVM_DIR}/nvm.sh"
            nvm use 22 2>/dev/null || nvm install 22
          fi
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: UI guardrails
        run: npm run ui:lint

      - name: i18n guardrails
        run: npm run i18n:lint

      - name: i18n key parity (all locales vs en)
        run: npm run i18n:coverage

      - name: ESLint (full)
        run: npm run lint:ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Vite build (CI)
        run: npm run build -- --mode development

      - name: Bundle size budget (gzip, largest JS chunk)
        run: npm run bundle:check
        env:
          BUNDLE_MAX_GZIP_KB: '250'

      - name: Install Playwright (Chromium, API smoke only)
        if: ${{ secrets.E2E_API_URL != '' && secrets.E2E_USER_EMAIL != '' && secrets.E2E_USER_PASSWORD != '' }}
        run: npx playwright install --with-deps chromium

      - name: Run integrations API & capture smoke
        if: ${{ secrets.E2E_API_URL != '' && secrets.E2E_USER_EMAIL != '' && secrets.E2E_USER_PASSWORD != '' }}
        env:
          E2E_API_URL: ${{ secrets.E2E_API_URL }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: npm run test:e2e:integrations

  security:
    runs-on: self-hosted
    needs: ci
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        working-directory: ${{ github.workspace }}
        env:
          GIT_TOKEN: ${{ github.token }}
        run: |
          rm -rf .git
          git init
          git remote add origin "https://oauth2:${GIT_TOKEN}@gitea-clovrlabs.apps.privateprompt.tech/clovrlabs/Propel.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Setup Node 22
        run: |
          export NVM_DIR="${HOME}/.nvm"
          if [ -s "${NVM_DIR}/nvm.sh" ]; then
            . "${NVM_DIR}/nvm.sh"
            nvm use 22 2>/dev/null || nvm install 22
          fi
          node --version

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (critical+)
        run: |
          # Time-boxed (see the api job): advisory API is unreachable from this
          # runner; clean → pass, real critical → fail, timeout → warn only.
          if timeout 120 npm audit --audit-level=critical; then
            echo "npm audit: clean"
          elif [ $? -eq 124 ]; then
            echo "::warning::npm audit timed out reaching the advisory API — skipped (review locally)"
          else
            echo "::error::npm audit found critical vulnerabilities"
            exit 1
          fi
