name: Build & publish Docker image

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - 'api/**'
      - '.gitea/workflows/build-production.yml'
  workflow_dispatch:

env:
  IMAGE: gitea.apps.privateprompt.tech/clovrlabs/n0crm

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login gitea.apps.privateprompt.tech -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Set up buildx builder
        run: |
          docker buildx inspect default >/dev/null 2>&1 || docker buildx create --use --name default --driver docker
          docker buildx use default

      - name: Build and push
        run: |
          docker buildx build \
            --push \
            --tag ${{ env.IMAGE }}:latest \
            --tag ${{ env.IMAGE }}:sha-${{ github.sha }} \
            --build-arg VITE_APP_CHANNEL=production \
            --file frontend/Dockerfile \
            .
