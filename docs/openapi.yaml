openapi: 3.1.0
info:
  title: Velo CRM Public API
  version: 1.0.0
servers:
  - url: https://YOUR-PROJECT.supabase.co/functions/v1/crm-public-api
paths:
  /v1/{collection}:
    get:
      summary: List entities by collection
      parameters:
        - in: path
          name: collection
          required: true
          schema:
            type: string
            enum: [contacts, companies, deals, activities]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  meta:
                    type: object
