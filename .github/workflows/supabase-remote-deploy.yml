# Apply remote DB migrations + deploy full Supabase Edge set from GitHub (no local terminal).
# Runs on push to master (auto) and supports manual trigger.
#
# Required secrets:
#   SUPABASE_ACCESS_TOKEN   — https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_ID     — project ref from dashboard URL …/project/<ref>
#   SUPABASE_DB_PASSWORD    — Database password (Settings → Database; reset if unknown)
#   SUPABASE_URL            — project URL, e.g. https://<project-ref>.supabase.co
#   SUPABASE_ANON_KEY       — anon key used by post-deploy smoke checks
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   TOKEN_ENCRYPTION_KEY    — 64 hex chars
#   GOOGLE_OAUTH_REDIRECT_URIS
#
# Optional (recommended for webhook-worker):
#   WEBHOOK_WORKER_SECRET   — long random string; same value as cron / WEBHOOK_WORKER_INVOKE_URL consumer
# Optional (recommended in production):
#   EDGE_CORS_ORIGINS       — comma-separated exact origins (scheme://host:port)
#
# After DB push, deploys all Edge Functions via `npm run supabase:deploy:all-functions`
# and runs Google/Gmail endpoint smoke checks (`npm run supabase:smoke:google-edge`).

name: Supabase remote deploy

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

concurrency:
  group: supabase-remote-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
      GOOGLE_OAUTH_REDIRECT_URIS: ${{ secrets.GOOGLE_OAUTH_REDIRECT_URIS }}
      EDGE_CORS_ORIGINS: ${{ secrets.EDGE_CORS_ORIGINS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Preflight required secrets and project alignment
        run: |
          required=(
            "SUPABASE_ACCESS_TOKEN"
            "SUPABASE_DB_PASSWORD"
            "SUPABASE_PROJECT_ID"
            "SUPABASE_URL"
            "SUPABASE_ANON_KEY"
            "GOOGLE_CLIENT_ID"
            "GOOGLE_CLIENT_SECRET"
            "TOKEN_ENCRYPTION_KEY"
            "GOOGLE_OAUTH_REDIRECT_URIS"
          )

          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}"
              exit 1
            fi
          done

          expected_url="https://${SUPABASE_PROJECT_ID}.supabase.co"
          if [ "${SUPABASE_URL}" != "${expected_url}" ]; then
            echo "SUPABASE_URL mismatch. Expected ${expected_url}, got ${SUPABASE_URL}"
            exit 1
          fi

          if [[ ! "${TOKEN_ENCRYPTION_KEY}" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "TOKEN_ENCRYPTION_KEY must be exactly 64 hex characters"
            exit 1
          fi

          if [ -z "${EDGE_CORS_ORIGINS}" ]; then
            echo "EDGE_CORS_ORIGINS is empty (allowed, but not recommended for production)"
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.92.1

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        run: supabase db push

      - name: Set Google OAuth Edge secrets
        run: |
          supabase secrets set \
            "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
            "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" \
            "TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY}" \
            "GOOGLE_OAUTH_REDIRECT_URIS=${GOOGLE_OAUTH_REDIRECT_URIS}"

          if [ -n "${EDGE_CORS_ORIGINS}" ]; then
            supabase secrets set "EDGE_CORS_ORIGINS=${EDGE_CORS_ORIGINS}"
          fi

      - name: Set WEBHOOK_WORKER_SECRET (optional)
        env:
          WEBHOOK_WORKER_SECRET: ${{ secrets.WEBHOOK_WORKER_SECRET }}
        run: |
          if [ -z "$WEBHOOK_WORKER_SECRET" ]; then
            echo "WEBHOOK_WORKER_SECRET not set — skipping Edge secret (set it in Dashboard or add repo secret)."
            exit 0
          fi
          supabase secrets set "WEBHOOK_WORKER_SECRET=${WEBHOOK_WORKER_SECRET}"

      - name: Deploy Edge Functions (full set, with retry)
        run: |
          max_attempts=3
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Deploy attempt ${attempt}/${max_attempts}"
            if npm run supabase:deploy:all-functions; then
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              backoff=$((attempt * 20))
              echo "Deploy failed on attempt ${attempt}. Retrying in ${backoff}s..."
              sleep "$backoff"
            fi

            attempt=$((attempt + 1))
          done

          echo "Deploy failed after ${max_attempts} attempts."
          exit 1

      - name: Smoke check Google/Gmail Edge functions
        run: npm run supabase:smoke:google-edge
