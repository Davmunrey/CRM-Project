name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: UI guardrails
        run: npm run ui:lint

      - name: i18n guardrails
        run: npm run i18n:lint

      - name: i18n key parity (all locales vs en)
        run: npm run i18n:coverage

      - name: ESLint
        run: npm run lint:ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests with coverage
        run: npx vitest run --coverage

      - name: Production build
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests (public pages, no API required)
        run: npx playwright test e2e/smoke.spec.ts e2e/a11y.spec.ts --reporter=line
        env:
          VITE_API_URL: /api
          CI_SKIP_BUILD: '1'

      - name: Bundle size budget
        run: npm run bundle:check
        env:
          BUNDLE_MAX_GZIP_KB: '250'

      - name: Dependency audit (critical+)
        run: npm audit --audit-level=critical

  e2e:
    runs-on: ubuntu-latest
    needs: ci
    if: ${{ vars.E2E_API_URL != '' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      E2E_API_URL: ${{ vars.E2E_API_URL }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: API & capture smoke (n0crm-api)
        run: npm run test:e2e:integrations
