name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_ORGANIZATION_ID: ${{ secrets.E2E_ORGANIZATION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: UI guardrails
        run: npm run ui:lint

      - name: i18n guardrails
        run: npm run i18n:lint

      - name: i18n key parity (all locales vs en)
        run: npm run i18n:coverage

      - name: ESLint (full)
        run: npm run lint:ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Vite build (CI, development mode)
        run: npm run build -- --mode development

      - name: Bundle size budget (gzip, largest JS chunk)
        run: npm run bundle:check
        env:
          BUNDLE_MAX_GZIP_KB: '250'

      - name: Install Playwright (Chromium, API smoke only)
        if: ${{ env.E2E_SUPABASE_URL != '' && env.E2E_SUPABASE_ANON_KEY != '' && env.E2E_USER_EMAIL != '' && env.E2E_USER_PASSWORD != '' && env.E2E_ORGANIZATION_ID != '' }}
        run: npx playwright install --with-deps chromium

      - name: Run integrations API & capture smoke
        if: ${{ env.E2E_SUPABASE_URL != '' && env.E2E_SUPABASE_ANON_KEY != '' && env.E2E_USER_EMAIL != '' && env.E2E_USER_PASSWORD != '' && env.E2E_ORGANIZATION_ID != '' }}
        env:
          E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_ORGANIZATION_ID: ${{ secrets.E2E_ORGANIZATION_ID }}
        run: npm run test:e2e:integrations

      - name: Dependency audit (critical+)
        run: npm audit --audit-level=critical
